group = "com.romanslack.dual_cameras_android"
version = "1.0"

buildscript {
    ext.kotlin_version = "1.9.24"
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath "com.android.tools.build:gradle:8.5.2"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

// CameraX is used only to negotiate the concurrent session and deliver frames
// into our own SurfaceTextures; we do NOT use CompositionSettings/VideoCapture.
ext.camerax_version = "1.4.1"

android {
    namespace = "com.romanslack.dual_cameras_android"
    compileSdk = 35

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        minSdk = 24
    }

    dependencies {
        implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1"
        implementation "androidx.camera:camera-core:$camerax_version"
        implementation "androidx.camera:camera-camera2:$camerax_version"
        implementation "androidx.camera:camera-lifecycle:$camerax_version"
        implementation "androidx.lifecycle:lifecycle-common:2.8.4"
        implementation "androidx.lifecycle:lifecycle-runtime:2.8.4"
    }
}
