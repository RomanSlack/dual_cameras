name: dual_camera_recorder_ios
description: >-
  iOS implementation of dual_camera_recorder (AVCaptureMultiCamSession +
  Metal compositor + AVAssetWriter).
version: 0.1.0
repository: https://github.com/RomanSlack/dual_camera_recorder_flutter/tree/main/packages/dual_camera_recorder_ios
issue_tracker: https://github.com/RomanSlack/dual_camera_recorder_flutter/issues
topics:
  - camera
  - video
  - recording

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  dual_camera_recorder_platform_interface: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    implements: dual_camera_recorder
    platforms:
      ios:
        pluginClass: DualCameraRecorderPlugin
        dartPluginClass: DualCameraRecorderIOS
