name: dual_cameras_example
description: "Demonstrates dual_cameras: front+back simultaneous capture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dual_cameras:
    path: ../
  permission_handler: ^11.3.1
  gal: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# The federated packages aren't published yet — resolve them locally.
dependency_overrides:
  dual_cameras:
    path: ../
  dual_cameras_platform_interface:
    path: ../../dual_cameras_platform_interface
  dual_cameras_android:
    path: ../../dual_cameras_android
  dual_cameras_ios:
    path: ../../dual_cameras_ios

flutter:
  uses-material-design: true
